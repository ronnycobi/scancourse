name: scancourse
description: Scan your results. Plan your future.
publish_to: 'none'
version: 1.0.3+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0

  # Forms / Files
  file_picker: ^7.0.2
  image_picker: ^1.1.0

  # Google Sign-In (needs Firebase / Google Cloud OAuth client IDs configured)
  google_sign_in: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.3.0
  share_plus: ^7.2.2
  flutter_markdown: ^0.7.4

  # Serialization
  json_annotation: ^4.9.0

  # Push notifications (FCM)
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.1.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/scancourse-logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/scancourse-logo.png"
