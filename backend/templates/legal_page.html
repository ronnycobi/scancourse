{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — Scancourse</title>
  <meta name="description" content="{{ title }} for Scancourse. {{ effective_date }}" />
  <meta name="theme-color" content="#1E40AF" />
  <link rel="icon" type="image/png" href="{% static 'landing/scancourse-logo.png' %}" />
  <style>
    :root {
      --primary: #1E40AF;
      --primary-dark: #1E3A8A;
      --primary-light: #DBEAFE;
      --text: #0F172A;
      --text-secondary: #475569;
      --text-hint: #94A3B8;
      --bg: #FFFFFF;
      --surface: #F8FAFC;
      --border: #E2E8F0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); }
    a:hover { text-decoration: underline; }

    /* Nav */
    header.nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.9);
      backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 17px; color: var(--text);
      text-decoration: none;
    }
    .brand img { width: 30px; height: 30px; border-radius: 8px; }
    .back-link {
      font-size: 14px; color: var(--text-secondary);
      text-decoration: none; font-weight: 500;
    }
    .back-link:hover { color: var(--primary); text-decoration: underline; }

    /* Hero strip */
    .page-hero {
      background: linear-gradient(180deg, #F0F7FF 0%, #FFFFFF 100%);
      padding: 56px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .page-hero-inner { max-width: 900px; margin: 0 auto; }
    .crumb {
      color: var(--primary); font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .page-hero h1 {
      font-size: 36px; font-weight: 800; letter-spacing: -0.01em;
      color: var(--text); margin-bottom: 8px;
    }
    .page-hero .meta {
      color: var(--text-secondary); font-size: 14px;
    }

    /* Content */
    main.content {
      max-width: 760px; margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .content h1 {
      font-size: 28px; font-weight: 800; margin: 32px 0 12px;
      letter-spacing: -0.01em;
    }
    .content h1:first-child { margin-top: 0; }
    .content h2 {
      font-size: 22px; font-weight: 700; margin: 36px 0 12px;
      letter-spacing: -0.01em;
    }
    .content h3 {
      font-size: 17px; font-weight: 700; margin: 24px 0 8px;
    }
    .content p { margin: 12px 0; color: var(--text); }
    .content ul, .content ol { margin: 12px 0 12px 24px; }
    .content li { margin: 6px 0; }
    .content strong { font-weight: 700; color: var(--text); }
    .content em { color: var(--text-secondary); }
    .content code {
      background: var(--surface); padding: 2px 6px;
      border-radius: 4px; font-size: 0.92em;
      border: 1px solid var(--border);
    }
    .content blockquote {
      border-left: 3px solid var(--primary);
      padding: 8px 0 8px 16px;
      margin: 20px 0;
      color: var(--text-secondary);
      background: var(--surface);
      border-radius: 4px;
    }
    .content hr {
      border: 0; border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .content table {
      width: 100%; border-collapse: collapse;
      margin: 16px 0; font-size: 14px;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 10px 12px; text-align: left;
    }
    .content th {
      background: var(--surface);
      font-weight: 700;
    }

    /* Footer */
    footer {
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .footer-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
      color: var(--text-hint); font-size: 13px;
    }
    .footer-inner a {
      color: var(--text-secondary); margin-right: 16px;
      text-decoration: none;
    }
    .footer-inner a:hover { color: var(--primary); }

    @media (max-width: 600px) {
      .page-hero h1 { font-size: 26px; }
      .content h1 { font-size: 22px; }
      .content h2 { font-size: 18px; }
    }
  </style>
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img src="{% static 'landing/scancourse-logo.png' %}" alt="Scancourse logo" />
        Scancourse
      </a>
      <a class="back-link" href="/">← Back to home</a>
    </div>
  </header>

  <section class="page-hero">
    <div class="page-hero-inner">
      <div class="crumb">Legal</div>
      <h1>{{ title }}</h1>
      <div class="meta">
        Version {{ version }} · Effective {{ effective_date }}
      </div>
    </div>
  </section>

  <main class="content">
    {{ html_content|safe }}
  </main>

  <footer>
    <div class="footer-inner">
      <div>© {% now "Y" %} Scancourse. All rights reserved.</div>
      <div>
        <a href="/legal/privacy/">Privacy</a>
        <a href="/legal/terms/">Terms</a>
        <a href="/legal/cookies/">Cookies</a>
        <a href="mailto:info@scancourse.co.za">Contact</a>
      </div>
    </div>
  </footer>

</body>
</html>
