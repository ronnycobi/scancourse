<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Course Importer{% endblock %} · Scancourse</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --primary:#2563EB; --primary-dark:#1D4ED8; --primary-light:#DBEAFE;
    --secondary:#10B981; --accent:#F59E0B;
    --error:#EF4444; --error-light:#FEE2E2;
    --surface:#F8FAFC; --card:#FFFFFF; --border:#E2E8F0;
    --text:#0F172A; --text-2:#64748B; --hint:#94A3B8;
  }
  body { font-family:'Poppins',sans-serif; background:var(--surface); color:var(--text); }
  .container { max-width:1200px; margin:0 auto; padding:24px; }

  .navbar {
    background:white; border-bottom:1px solid var(--border); padding:14px 24px;
    display:flex; align-items:center; gap:24px;
  }
  .navbar .brand {
    display:flex; align-items:center; gap:10px;
    color:var(--primary); font-weight:700; font-size:18px; text-decoration:none;
  }
  .navbar .logo {
    width:36px; height:36px; background:var(--primary-light); color:var(--primary);
    border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .navbar .nav-links { display:flex; gap:16px; }
  .navbar .nav-links a {
    color:var(--text-2); text-decoration:none; font-size:14px; font-weight:500;
    padding:6px 12px; border-radius:6px;
  }
  .navbar .nav-links a:hover { color:var(--primary); background:var(--primary-light); }
  .navbar .right { margin-left:auto; color:var(--text-2); font-size:13px; }

  h1 { font-size:24px; font-weight:700; margin-bottom:6px; }
  h2 { font-size:18px; font-weight:600; margin-bottom:12px; }
  .subtitle { color:var(--text-2); font-size:14px; margin-bottom:24px; }

  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:24px; margin-bottom:20px;
  }
  .panel h2 { display:flex; align-items:center; gap:8px; }

  .tabs { display:flex; gap:4px; margin-bottom:16px;
    background:white; padding:4px; border-radius:10px;
    border:1px solid var(--border); width:fit-content; }
  .tab {
    padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500;
    cursor:pointer; color:var(--text-2); border:none; background:transparent;
    font-family:inherit;
  }
  .tab.active { background:var(--primary); color:white; }

  label { display:block; font-size:13px; font-weight:500; color:var(--text-2); margin-bottom:4px; }
  input, select, textarea {
    width:100%; padding:10px 12px; border:1px solid var(--border);
    border-radius:8px; font-family:inherit; font-size:14px; background:white;
  }
  input:focus, select:focus, textarea:focus {
    outline:none; border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,0.1);
  }
  textarea { min-height:120px; resize:vertical; }

  .form-grid { display:grid; grid-template-columns:1fr 220px; gap:12px; margin-bottom:16px; }
  @media (max-width:700px) { .form-grid { grid-template-columns:1fr; } }

  .file-drop {
    border:2px dashed var(--border); border-radius:10px; padding:24px;
    text-align:center; cursor:pointer; background:var(--surface);
    transition:all 0.15s;
  }
  .file-drop:hover, .file-drop.drag-over {
    border-color:var(--primary); background:var(--primary-light);
  }
  .file-drop .icon { font-size:32px; margin-bottom:6px; }
  .file-drop p { color:var(--text-2); font-size:13px; }
  .file-drop input[type=file] { display:none; }

  .btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:10px 20px; border-radius:8px; font-family:inherit;
    font-weight:600; font-size:14px; cursor:pointer; border:none; text-decoration:none;
  }
  .btn-primary { background:var(--primary); color:white; }
  .btn-primary:hover { background:var(--primary-dark); }
  .btn-outline { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
  .btn-secondary { background:var(--secondary); color:white; }
  .btn-danger { background:var(--error); color:white; }
  .btn[disabled] { opacity:0.5; cursor:not-allowed; }

  .alert {
    padding:12px 16px; border-radius:8px; font-size:14px;
    margin-bottom:16px; border-left:4px solid;
  }
  .alert.success { background:#D1FAE5; color:#065F46; border-color:var(--secondary); }
  .alert.error { background:var(--error-light); color:#991B1B; border-color:var(--error); }
  .alert.info { background:var(--primary-light); color:#1E40AF; border-color:var(--primary); }

  .meta-row { display:flex; gap:16px; flex-wrap:wrap; font-size:13px; color:var(--text-2); margin-bottom:16px; }
  .meta-row .item strong { color:var(--text); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th {
    background:var(--surface); padding:10px 8px; text-align:left;
    font-weight:600; font-size:12px; color:var(--text-2);
    border-bottom:2px solid var(--border); position:sticky; top:0;
  }
  tbody td {
    padding:6px 8px; border-bottom:1px solid var(--border); vertical-align:top;
  }
  tbody tr:hover { background:var(--surface); }
  tbody td input, tbody td select {
    padding:4px 6px; font-size:12px; border:1px solid transparent;
    background:transparent;
  }
  tbody td input:focus, tbody td select:focus { border-color:var(--primary); background:white; }

  .badge {
    display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600;
  }
  .badge.pending { background:#FEF3C7; color:#92400E; }
  .badge.parsing { background:var(--primary-light); color:var(--primary); }
  .badge.ready { background:var(--primary-light); color:var(--primary); }
  .badge.saved { background:#D1FAE5; color:#065F46; }
  .badge.failed { background:var(--error-light); color:#991B1B; }

  .table-wrap {
    max-height:600px; overflow:auto; border:1px solid var(--border); border-radius:8px;
    background:white;
  }

  .col-name { min-width:240px; }
  .col-name input { font-weight:500; min-width:240px; }
  .col-field select, .col-level select { min-width:120px; }
  .col-aps input { width:50px; }
  .col-years input { width:60px; }
  .col-fees input { width:80px; }
  .col-inst input { width:60px; }
  .col-campus input { min-width:140px; }
  .col-code input { width:80px; font-family: monospace; font-size: 11px; }
  .col-desc input { min-width:200px; }
  .col-del { width:40px; text-align:center; }

  .delete-btn { background:none; border:none; color:var(--hint); cursor:pointer; font-size:16px; }
  .delete-btn:hover { color:var(--error); }

  .empty-state { text-align:center; padding:48px 24px; color:var(--text-2); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; opacity:0.5; }
</style>
</head>
<body>

<div class="navbar">
  <a href="{% url 'importer:home' %}" class="brand">
    <div class="logo">📚</div>
    <span>Course Importer</span>
  </a>
  <div class="nav-links">
    <a href="{% url 'importer:home' %}">New Import</a>
    <a href="{% url 'importer:history' %}">History</a>
    <a href="/admin/">Django Admin</a>
  </div>
  <div class="right">{{ request.user.email }}</div>
</div>

<div class="container">

  {% if messages %}
    {% for m in messages %}
      <div class="alert {{ m.tags }}">{{ m }}</div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}

</div>

{% block scripts %}{% endblock %}
</body>
</html>
